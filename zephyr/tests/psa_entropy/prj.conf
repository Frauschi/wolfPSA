CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=8192
CONFIG_MAIN_STACK_SIZE=8192

CONFIG_WOLFSSL=y
CONFIG_PSA_CRYPTO=y
CONFIG_PSA_CRYPTO_PROVIDER_CUSTOM=y

# Pull in the hardware entropy driver so wolfCrypt's wc_GenerateSeed() seeds the
# DRBG from it (the module's random.c uses the entropy driver whenever
# ENTROPY_HAS_DRIVER is set), exercising the real seed path rather than
# sys_rand_get().
CONFIG_ENTROPY_GENERATOR=y

# Broad example wolfCrypt config so wolfPSA exposes a full PSA surface (the
# example is self-contained and crypto-only). A real application points this at
# its own config or uses the module Kconfig.
CONFIG_WOLFSSL_SETTINGS_FILE="zephyr/user_settings_example.h"
