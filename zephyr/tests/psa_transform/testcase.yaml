#
# Unit-tests wolfPSA's wolfCrypt AES-GCM secure_storage ITS transform directly:
# confidentiality at rest, tamper detection, and UID binding -- behavior Zephyr's
# own passthrough custom-transform test cannot cover. The generic persistent-key
# / ITS flows are covered by the psa_its, psa_persistent_key and
# psa_secure_storage wrappers (which run Zephyr's own apps against wolfPSA).
common:
  filter: not CONFIG_BUILD_WITH_TFM
  tags:
    - wolfpsa
    - psa
    - secure_storage
tests:
  crypto.wolfpsa.psa_transform:
    integration_platforms:
      - native_sim/native/64
