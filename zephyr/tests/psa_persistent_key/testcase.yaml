# Runs Zephyr's own persistent-key PSA sample against wolfPSA (drop-in proof).
common:
  filter: not CONFIG_BUILD_WITH_TFM
  tags:
    - wolfpsa
    - psa
    - secure_storage
  harness: console
  harness_config:
    type: one_line
    regex:
      - "Sample finished successfully."
tests:
  crypto.wolfpsa.psa_persistent_key:
    integration_platforms:
      - native_sim/native/64
