#
# TLS + wolfPSA coexistence: the wolfSSL TLS stack AND the wolfPSA PSA provider
# in one image, both on the same shared wolfCrypt core.

CONFIG_ZTEST=y
CONFIG_ZTEST_STACK_SIZE=32768
CONFIG_MAIN_STACK_SIZE=32768
CONFIG_COMMON_LIBC_MALLOC_ARENA_SIZE=262144

CONFIG_WOLFSSL=y
CONFIG_PSA_CRYPTO=y
CONFIG_PSA_CRYPTO_PROVIDER_CUSTOM=y

# Keep the wolfSSL TLS layer in the build (do NOT force WOLFCRYPT_ONLY) so it
# coexists with the wolfPSA provider. No CONFIG_WOLFSSL_SETTINGS_FILE here: use
# the module's default config, which enables the TLS layer plus a broad crypto
# set (the wolfPSA knobs still add the Hash-DRBG for the PSA RNG).

CONFIG_ENTROPY_GENERATOR=y

# The wolfSSL TLS layer's socket I/O (wolfio.c) uses Zephyr's BSD sockets, so
# the networking stack must be present for it to link. (The sockets TLS backend
# is wolfSSL here, since CONFIG_WOLFSSL is set.)
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_TCP=y
CONFIG_NET_IPV4=y
